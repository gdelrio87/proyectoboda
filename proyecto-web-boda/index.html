<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="envelope-landing">
        <div class="background-image"></div>

        <div class="envelope-container">
            <div class="envelope" id="envelope">
                <!-- Sobre cerrado -->
                <div class="envelope-closed" id="envelopeClosed">
                    <div class="envelope-body">
                        <div class="envelope-front">
                            <div class="envelope-flap"></div>
                            <div class="envelope-base"></div>
                        </div>
                    </div>
                </div>

                <!-- Carta abierta -->
                <div class="envelope-open" id="envelopeOpen" hidden>
                    <div class="card">
                        <h1 class="card-title">Estás invitado a la boda de</h1>
                        <h2 class="card-names">Elizabeth & Gonzalo</h2>
                        <p class="card-date">21 de noviembre del 2026</p>
                        <p class="card-location">Sevilla</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="confetti-container" class="confetti-container"></div>

        <section id="envelopeActions" class="actions" aria-live="polite" hidden>
            <a href="main.html" class="action-button action-button-primary">Continuar</a>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
