<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Elizabeth & Gonzalo</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="video-wrapper">

        <video id="introVideo"
               src="assets/videos/intro_boda.mp4"
               playsinline
               preload="auto">
        </video>

        <!-- Overlay: pulsa para comenzar -->
        <div class="start-overlay" id="startOverlay" role="button" aria-label="Pulsa para comenzar">
            <span class="start-text">Pulsa para comenzar</span>
        </div>

        <!-- Overlay: fin del vídeo -->
        <div class="end-overlay hidden" id="endOverlay" aria-live="polite">
            <div class="end-buttons">
                <button class="action-btn action-btn-replay" id="replayBtn">Volver al inicio </button>
                <a href="main.html" class="action-btn action-btn-continue">Continuar</a>
            </div>
        </div>

    </div>

    <script>
        const video       = document.getElementById('introVideo');
        const startOvl    = document.getElementById('startOverlay');
        const endOvl      = document.getElementById('endOverlay');
        const replayBtn   = document.getElementById('replayBtn');

        // Muestra el primer fotograma en cuanto haya metadatos
        video.addEventListener('loadedmetadata', () => {
            video.currentTime = 0.001;
        });

        function playVideo() {
            video.muted = false;
            video.currentTime = 0;
            const p = video.play();
            if (p !== undefined) {
                p.catch(() => {
                    // Fallback: algunos navegadores bloquean audio en el primer intento
                    video.muted = true;
                    video.play();
                });
            }
        }

        startOvl.addEventListener('click', () => {
            startOvl.style.display = 'none';
            playVideo();
        });

        video.addEventListener('ended', () => {
            endOvl.classList.remove('hidden');
        });

        replayBtn.addEventListener('click', () => {
            endOvl.classList.add('hidden');
            playVideo();
        });
    </script>
</body>
</html>
