<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Elizabeth & Gonzalo | 21/11/26 | Sevilla</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="video-wrapper">

        <!-- Vídeo mobile (vertical) -->
        <video id="introVideoMobile"
               class="intro-video intro-video-mobile"
               src="assets/videos/final_video_intro_sobre.mp4"
               playsinline
               preload="auto">
        </video>

        <!-- Vídeo tablet/desktop (horizontal) -->
        <video id="introVideoDesktop"
               class="intro-video intro-video-desktop"
               src="assets/videos/intro_16_9_final_con_sobre.mp4"
               playsinline
               preload="auto">
        </video>

        <!-- Overlay: pulsa para comenzar -->
        <div class="start-overlay" id="startOverlay" role="button" aria-label="Pulsa para comenzar">
            <span class="start-text">Pulsa para comenzar</span>
        </div>

        <!-- Overlay: fin del vídeo -->
        <div class="end-overlay hidden" id="endOverlay" aria-live="polite">
            <a href="main.html" class="btn-continue">Continuar</a>
            <button class="btn-replay" id="replayBtn">Volver a ver</button>
        </div>

    </div>

    <script>
        const videoMobile  = document.getElementById('introVideoMobile');
        const videoDesktop = document.getElementById('introVideoDesktop');
        const startOvl     = document.getElementById('startOverlay');
        const endOvl       = document.getElementById('endOverlay');
        const replayBtn    = document.getElementById('replayBtn');

        const mobileQuery = window.matchMedia('(max-width: 767px)');

        function activeVideo() {
            return mobileQuery.matches ? videoMobile : videoDesktop;
        }

        // Muestra el primer fotograma de cada vídeo en cuanto haya metadatos
        [videoMobile, videoDesktop].forEach(v => {
            v.addEventListener('loadedmetadata', () => {
                v.currentTime = 0.001;
            });
            v.addEventListener('ended', () => {
                endOvl.classList.remove('hidden');
            });
        });

        function playVideo() {
            const video = activeVideo();
            video.muted = false;
            video.currentTime = 0;
            const p = video.play();
            if (p !== undefined) {
                p.catch(() => {
                    // Fallback: algunos navegadores bloquean audio en el primer intento
                    video.muted = true;
                    video.play();
                });
            }
        }

        startOvl.addEventListener('click', () => {
            startOvl.style.display = 'none';
            playVideo();
        });

        replayBtn.addEventListener('click', () => {
            endOvl.classList.add('hidden');
            playVideo();
        });
    </script>
</body>
</html>
